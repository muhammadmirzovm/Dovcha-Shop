{% load static %}
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand logo" href="/"><img src="{% static 'images/dochashop-logo.png' %}" alt=""></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a href="/" class="nav-link">Home</a>
        </li>
        <li class="nav-item">
          {% if request.user.is_authenticated and request.user.role == "SELLER" %}
<a class="nav-link" href="{% url 'seller_products' %}">
My Products
</a>
{% endif %}
        </li>
      </ul>
    {% if request.user.is_authenticated %}
            <div class="navbar-username">

              <a class="bg-dark text-white fw-bold m-2" href="{% url 'profile' %}">{{ request.user.username | slice:1 | title }}</a>
            </div>




               <form method="post" action="{% url 'logout' %}">
                   {% csrf_token %}
                   <button class="btn btn-dark" type="submit">Logout</button>
               </form>
           {% else %}
              <a class="btn btn-outline-secondary mx-3" href="{% url 'login' %}">Login</a>
               <a class="btn btn-secondary" href="{% url 'signup' %}">Register</a>

           {% endif %}
    </div>
  </div>
</nav>
