{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Product form{% endblock %}
{% block content %}
<div class="row justify-content-center m-5">
 <div class="col-md-8">
   <div class="card shadow-sm">
     <div class="card-body">
       <h1 class="h4 mb-3">Product</h1>
       <!-- main_image borligi uchun enctype shart -->
       <form method="post" enctype="multipart/form-data">
         {% csrf_token %}
         {{ form | crispy }}

         <div class="d-flex gap-2">
           <button class="btn btn-dark">Save</button>
           <a class="btn btn-outline-secondary" href="{% url 'seller_products' %}">Cancel</a>
         </div>
       </form>

     </div>
   </div>
 </div>
</div>
{% endblock %}
